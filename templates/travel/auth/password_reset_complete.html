{% extends "base.html" %}

{% block title %}Password Reset Complete{% endblock %}

{% block content %}
<section class="auth-wrap py-5">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-5">
        <div class="glass-card p-4 text-center">
          <h1 class="h4 mb-2">Password updated</h1>
          <p class="text-secondary">You can now login with your new password.</p>
          <a href="{% url 'login' %}" class="btn btn-primary rounded-pill">Go to login</a>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
