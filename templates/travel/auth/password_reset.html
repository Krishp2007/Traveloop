{% extends "base.html" %}

{% block title %}Reset Password{% endblock %}

{% block content %}
<section class="auth-wrap py-5">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-5">
        <div class="glass-card p-4">
          <h1 class="h4 mb-2">Forgot your password?</h1>
          <p class="text-secondary">Enter your email and we will send reset instructions.</p>
          <form method="post">
            {% csrf_token %}
            {{ form.email }}
            {% if form.email.errors %}<div class="small text-danger mt-1">{{ form.email.errors }}</div>{% endif %}
            <button class="btn btn-primary w-100 mt-3 rounded-pill">Send reset link</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
